---
layout: default
---

<article class="post">
  <h1>{{ page.title }}</h1>

  <div class="entry">
    {{ content }}
  </div>

  <div class="date">
    {% assign written_on = page.written_on | default: page.date %}
    Written on {{ written_on | date: "%B %e, %Y" }}
  </div>

  {% include disqus.html %}
</article>
